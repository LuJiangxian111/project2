version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ai-position-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ai_position_square
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ai-position-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_TYPE=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - DB_DATABASE=ai_position_square
      - JWT_SECRET=ai-position-square-jwt-secret-2024-production-key
      - CORS_ORIGIN=*
      - PORT=3000
    depends_on:
      - mysql

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ai-position-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data: